    <style>
      *,
      ::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      * {
        --color-text: #110a29;
        --color-background: #e4def7;
        --color-primary: #4a2db4;
        --color-secondary: #d5ccf0;
        --color-accent: #694bd2;
      }

      @media (prefers-color-scheme: dark) {
        * {
          --color-text: #e4def7;
          --color-background: #110a29;
          --color-primary: #4528a4;
          --color-secondary: #1b1146;
          --color-accent: #694bd2;
        }
      }

      a {
        text-decoration: none;
        color: var(--color-text);
      }

      a:hover {
        text-decoration: underline;
      }

      body {
        background-color: var(--color-background);
        color: var(--color-text);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          "Open Sans",
          "Helvetica Neue",
          sans-serif;
        line-height: 1.5;
        font-size: 16px;
      }

      main {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        justify-content: center;
        align-items: center;
        position: absolute;
        top: 20%;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
      }

      h1 {
        font-size: 2.5rem;
        line-height: 1;
      }

      .primary-button {
        display: flex;
        gap: 0.5rem;
        margin: 0.5rem;
        padding: 0.5rem 0.75rem;
        border-radius: 0.25rem;
        background-color: var(--color-primary);
        color: #e4def7;
      }

      .primary-button:hover {
        background-color: var(--color-accent);
      }

      .icon {
        fill: #e4def7;
      }

      .links {
        display: flex;
        gap: 0.75rem;
        align-items: center;
      }
      .links a {
        display: flex;
        gap: 0.25rem;
      }

      .links svg {
        fill: var(--color-text);
      }

      li {
        list-style: none;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .fade-in-up {
        opacity: 0;
        animation: fadeInUp 0.6s ease-out forwards;
      }
    </style>
  </head>
